<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — MyShop</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E2136E;
    --pink-dark: #b50d56;
    --pink-light: #fce4ef;
    --bg: #f8f9fa;
    --dark: #1a0a10;
    --gray: #6b7280;
    --border: #e5e7eb;
    --card: #ffffff;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--dark); }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--pink) 0%, #ff6b9d 100%);
  }
  .login-box {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-box h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .login-box p { color: var(--gray); font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  .login-box input:focus { border-color: var(--pink); }
  .login-btn {
    width: 100%;
    background: var(--pink);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }
  .login-hint { font-size: 11px; color: var(--gray); margin-top: 12px; }

  /* ADMIN LAYOUT */
  .admin-layout { display: none; }
  .admin-layout.show { display: block; }

  header {
    background: var(--pink);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { color: white; font-size: 18px; font-weight: 700; }
  .logout-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }

  .admin-body { padding: 24px; max-width: 1100px; margin: 0 auto; }

  /* STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--border);
  }
  .stat-label { font-size: 12px; color: var(--gray); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); }
  .stat-value.pink { color: var(--pink); }
  .stat-value.green { color: var(--success); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--pink);
    color: white;
    border-color: var(--pink);
  }
  .search-input {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    outline: none;
    min-width: 200px;
  }
  .search-input:focus { border-color: var(--pink); }

  /* ORDERS TABLE */
  .orders-card {
    background: white;
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .orders-card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .orders-card-header h2 { font-size: 16px; font-weight: 700; }
  .clear-btn {
    background: none;
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }

  .orders-list { padding: 0; }
  .order-item {
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    transition: background 0.15s;
  }
  .order-item:last-child { border-bottom: none; }
  .order-item:hover { background: #fafafa; }
  .order-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .order-id-tag {
    font-size: 12px;
    font-weight: 700;
    color: var(--pink);
    background: var(--pink-light);
    padding: 3px 10px;
    border-radius: 10px;
  }
  .order-date { font-size: 11px; color: var(--gray); margin-top: 4px; }
  .order-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 12px;
  }
  .order-detail-item { }
  .order-detail-label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
  .order-detail-value { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .txn-id { font-family: monospace; color: var(--pink); }

  /* STATUS BADGE */
  .status-select {
    padding: 5px 10px;
    border-radius: 20px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    outline: none;
  }
  .status-pending { background: #fff3cd; color: #856404; }
  .status-confirmed { background: #d1ecf1; color: #0c5460; }
  .status-delivered { background: #d4edda; color: #155724; }
  .status-cancelled { background: #f8d7da; color: #721c24; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray);
  }
  .empty-state div { font-size: 48px; margin-bottom: 12px; }

  /* BACK LINK */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--pink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>MyShop Order Management</p>
    <input type="password" id="passwordInput" placeholder="Enter admin password" onkeypress="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Login</button>
    <p class="login-hint">Default password: <strong>admin123</strong> — change it in the code</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-layout" id="adminLayout">
  <header>
    <h1>🛍️ MyShop — Order Manager</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <a href="index.html" style="color:rgba(255,255,255,0.8);font-size:12px;text-decoration:none">← View Shop</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="admin-body">
    <div class="stats-row" id="statsRow"></div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('All', this)">All</button>
      <button class="filter-btn" onclick="filterOrders('Pending', this)">⏳ Pending</button>
      <button class="filter-btn" onclick="filterOrders('Confirmed', this)">✓ Confirmed</button>
      <button class="filter-btn" onclick="filterOrders('Delivered', this)">🚚 Delivered</button>
      <button class="filter-btn" onclick="filterOrders('Cancelled', this)">✕ Cancelled</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name / phone / txn..." oninput="renderOrders()" />
    </div>

    <div class="orders-card">
      <div class="orders-card-header">
        <h2>Orders <span id="orderCount" style="color:var(--gray);font-weight:400;font-size:14px"></span></h2>
        <button class="clear-btn" onclick="clearAllOrders()">🗑 Clear All</button>
      </div>
      <div class="orders-list" id="ordersList"></div>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const ADMIN_PASSWORD = 'tawhid992x'; // ← CHANGE THIS
// ================================

let currentFilter = 'All';

function login() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').classList.add('show');
    renderStats();
    renderOrders();
  } else {
    alert('Wrong password!');
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminLayout').classList.remove('show');
  document.getElementById('passwordInput').value = '';
}

function getOrders() {
  return JSON.parse(localStorage.getItem('shop_orders') || '[]');
}

function saveOrders(orders) {
  localStorage.setItem('shop_orders', JSON.stringify(orders));
}

function renderStats() {
  const orders = getOrders();
  const total = orders.length;
  const pending = orders.filter(o => o.status === 'Pending').length;
  const delivered = orders.filter(o => o.status === 'Delivered').length;
  const revenue = orders.filter(o => o.status !== 'Cancelled').reduce((s, o) => s + o.price, 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value pink">${total}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value" style="color:var(--warning)">${pending}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Delivered</div>
      <div class="stat-value green">${delivered}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Revenue</div>
      <div class="stat-value pink">৳${revenue.toLocaleString()}</div>
    </div>
  `;
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let orders = getOrders();

  if (currentFilter !== 'All') {
    orders = orders.filter(o => o.status === currentFilter);
  }
  if (search) {
    orders = orders.filter(o =>
      o.customerName.toLowerCase().includes(search) ||
      o.customerPhone.includes(search) ||
      o.txnId.toLowerCase().includes(search) ||
      o.id.toLowerCase().includes(search)
    );
  }

  document.getElementById('orderCount').textContent = `(${orders.length})`;

  if (orders.length === 0) {
    document.getElementById('ordersList').innerHTML = `
      <div class="empty-state">
        <div>📭</div>
        No orders found.
      </div>
    `;
    return;
  }

  document.getElementById('ordersList').innerHTML = orders.map(order => `
    <div class="order-item">
      <div class="order-top">
        <div>
          <span class="order-id-tag">${order.id}</span>
          <div class="order-date">🕐 ${order.date}</div>
        </div>
        <select class="status-select status-${order.status.toLowerCase()}"
          onchange="updateStatus('${order.id}', this.value, this)">
          <option ${order.status==='Pending'?'selected':''}>Pending</option>
          <option ${order.status==='Confirmed'?'selected':''}>Confirmed</option>
          <option ${order.status==='Delivered'?'selected':''}>Delivered</option>
          <option ${order.status==='Cancelled'?'selected':''}>Cancelled</option>
        </select>
      </div>
      <div class="order-details">
        <div class="order-detail-item">
          <div class="order-detail-label">Customer</div>
          <div class="order-detail-value">${order.customerName}</div>
        </div>
        <div class="order-detail-item">
          <div class="order-detail-label">Phone</div>
          <div class="order-detail-value">${order.customerPhone}</div>
        </div>
        <div class="order-detail-item">
          <div class="order-detail-label">Product</div>
          <div class="order-detail-value">${order.product}</div>
        </div>
        <div class="order-detail-item">
          <div class="order-detail-label">Amount</div>
          <div class="order-detail-value" style="color:var(--pink)">৳${order.price}</div>
        </div>
        <div class="order-detail-item">
          <div class="order-detail-label">bKash TxnID</div>
          <div class="order-detail-value txn-id">${order.txnId}</div>
        </div>
        ${order.address ? `<div class="order-detail-item">
          <div class="order-detail-label">Address</div>
          <div class="order-detail-value" style="font-size:12px">${order.address}</div>
        </div>` : ''}
        ${order.note ? `<div class="order-detail-item">
          <div class="order-detail-label">Note</div>
          <div class="order-detail-value" style="font-size:12px;color:var(--gray)">${order.note}</div>
        </div>` : ''}
      </div>
    </div>
  `).join('');
}

function updateStatus(orderId, newStatus, selectEl) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.id === orderId);
  if (idx !== -1) {
    orders[idx].status = newStatus;
    saveOrders(orders);
    selectEl.className = `status-select status-${newStatus.toLowerCase()}`;
    renderStats();
  }
}

function clearAllOrders() {
  if (confirm('Delete ALL orders? This cannot be undone.')) {
    localStorage.removeItem('shop_orders');
    renderStats();
    renderOrders();
  }
}
</script>
</body>
</html>
