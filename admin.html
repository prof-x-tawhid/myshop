<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — MyShop</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E2136E;
    --pink-dark: #b50d56;
    --pink-light: #fce4ef;
    --bg: #f8f9fa;
    --dark: #1a0a10;
    --gray: #6b7280;
    --border: #e5e7eb;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--dark); }

  /* LOGIN */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--pink) 0%, #ff6b9d 100%);
  }
  .login-box {
    background: white;
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-box h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .login-box p { color: var(--gray); font-size: 13px; margin-bottom: 28px; }
  .login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
  }
  .login-box input:focus { border-color: var(--pink); }
  .login-btn {
    width: 100%;
    background: var(--pink);
    color: white;
    border: none;
    padding: 13px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }
  .login-hint { font-size: 11px; color: var(--gray); margin-top: 12px; }

  /* ADMIN LAYOUT */
  .admin-layout { display: none; }
  .admin-layout.show { display: block; }

  header {
    background: var(--pink);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(226,19,110,0.3);
  }
  header h1 { color: white; font-size: 18px; font-weight: 700; }
  .logout-btn {
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Sora', sans-serif;
  }

  /* TABS */
  .tabs { background: white; border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; }
  .tab { padding: 14px 20px; font-size: 14px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: var(--gray); transition: all 0.2s; }
  .tab.active { color: var(--pink); border-bottom-color: var(--pink); }
  .tab-content { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
  .tab-content.active { display: block; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: white; border-radius: 14px; padding: 20px; border: 1px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--gray); margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); }
  .stat-value.pink { color: var(--pink); }
  .stat-value.green { color: var(--success); }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: var(--pink); color: white; border-color: var(--pink); }
  .search-input { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-family: 'Sora', sans-serif; font-size: 13px; outline: none; min-width: 200px; }
  .search-input:focus { border-color: var(--pink); }

  /* ORDERS */
  .orders-card { background: white; border-radius: 16px; border: 1px solid var(--border); overflow: hidden; }
  .orders-card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .orders-card-header h2 { font-size: 16px; font-weight: 700; }
  .clear-btn { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'Sora', sans-serif; }
  .order-item { border-bottom: 1px solid var(--border); padding: 16px 20px; transition: background 0.15s; }
  .order-item:last-child { border-bottom: none; }
  .order-item:hover { background: #fafafa; }
  .order-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .order-id-tag { font-size: 12px; font-weight: 700; color: var(--pink); background: var(--pink-light); padding: 3px 10px; border-radius: 10px; }
  .order-date { font-size: 11px; color: var(--gray); margin-top: 4px; }
  .order-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 12px; }
  .order-detail-label { font-size: 10px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; }
  .order-detail-value { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .txn-id { font-family: monospace; color: var(--pink); }
  .status-select { padding: 5px 10px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Sora', sans-serif; outline: none; }
  .status-pending { background: #fff3cd; color: #856404; }
  .status-confirmed { background: #d1ecf1; color: #0c5460; }
  .status-delivered { background: #d4edda; color: #155724; }
  .status-cancelled { background: #f8d7da; color: #721c24; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
  .empty-state div { font-size: 48px; margin-bottom: 12px; }

  /* PRODUCTS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-header h2 { font-size: 18px; font-weight: 700; }
  .add-btn { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }
  .add-btn:hover { background: var(--pink-dark); }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .product-admin-card { background: white; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .product-admin-thumb { width: 100%; height: 160px; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 52px; overflow: hidden; }
  .product-admin-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-admin-info { padding: 14px; }
  .product-admin-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .product-admin-price { font-size: 16px; font-weight: 700; color: var(--pink); margin-bottom: 10px; }
  .product-admin-actions { display: flex; gap: 8px; }
  .edit-btn { flex: 1; background: #e8f4fd; color: #0c63a8; border: none; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }
  .del-btn { flex: 1; background: #fde8e8; color: var(--danger); border: none; padding: 7px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }
  .stock-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-bottom: 8px; }
  .stock-on { background: #d4edda; color: #155724; }
  .stock-off { background: #f8d7da; color: #721c24; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,10,16,0.6); backdrop-filter: blur(4px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { background: var(--pink); padding: 18px 24px; border-radius: 20px 20px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { color: white; font-size: 17px; font-weight: 700; }
  .modal-close { background: rgba(255,255,255,0.2); border: none; color: white; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 24px; }
  .modal-footer { display: flex; gap: 10px; padding: 0 24px 24px; }
  .cancel-btn { flex: 1; background: #f3f4f6; color: var(--dark); border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }
  .confirm-btn { flex: 2; background: var(--pink); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Sora', sans-serif; }
  .confirm-btn:hover { background: var(--pink-dark); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Sora', sans-serif; outline: none; transition: border-color 0.2s; background: white; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--pink); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media(max-width:500px) { .form-row { grid-template-columns: 1fr; } }

  /* PHOTO UPLOAD */
  .photo-upload-area { border: 2px dashed var(--border); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
  .photo-upload-area:hover { border-color: var(--pink); background: var(--pink-light); }
  .photo-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; margin-top: 10px; display: none; }
  .photo-preview.show { display: block; }
  .remove-photo-btn { background: #fde8e8; color: var(--danger); border: none; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; margin-top: 8px; display: none; }
  .remove-photo-btn.show { display: inline-block; }

  /* EMOJI PICKER */
  .emoji-picker { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 8px; max-height: 120px; overflow-y: auto; }
  .emoji-option { font-size: 20px; text-align: center; padding: 5px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .emoji-option:hover { background: var(--pink-light); }
  .emoji-option.selected { border-color: var(--pink); background: var(--pink-light); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>MyShop Order Management</p>
    <input type="password" id="passwordInput" placeholder="Enter admin password" onkeypress="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Login</button>
    <p class="login-hint">Default password: <strong>admin123</strong> — change it in the code</p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-layout" id="adminLayout">
  <header>
    <h1>🛍️ MyShop Admin</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <a href="index.html" style="color:rgba(255,255,255,0.8);font-size:12px;text-decoration:none">← View Shop</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders', this)">📦 Orders</div>
    <div class="tab" onclick="switchTab('products', this)">🛍️ Products</div>
  </div>

  <!-- ORDERS TAB -->
  <div class="tab-content active" id="tab-orders">
    <div class="stats-row" id="statsRow"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="filterOrders('All', this)">All</button>
      <button class="filter-btn" onclick="filterOrders('Pending', this)">⏳ Pending</button>
      <button class="filter-btn" onclick="filterOrders('Confirmed', this)">✓ Confirmed</button>
      <button class="filter-btn" onclick="filterOrders('Delivered', this)">🚚 Delivered</button>
      <button class="filter-btn" onclick="filterOrders('Cancelled', this)">✕ Cancelled</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search name / phone / txn..." oninput="renderOrders()" />
    </div>
    <div class="orders-card">
      <div class="orders-card-header">
        <h2>Orders <span id="orderCount" style="color:var(--gray);font-weight:400;font-size:14px"></span></h2>
        <button class="clear-btn" onclick="clearAllOrders()">🗑 Clear All</button>
      </div>
      <div id="ordersList"></div>
    </div>
  </div>

  <!-- PRODUCTS TAB -->
  <div class="tab-content" id="tab-products">
    <div class="section-header">
      <h2>Products</h2>
      <button class="add-btn" onclick="openProductModal()">＋ Add Product</button>
    </div>
    <div class="products-grid" id="productsList"></div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Product</h2>
      <button class="modal-close" onclick="closeProductModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="prod-name" placeholder="e.g. Nike Air Max" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="prod-desc" placeholder="Short product description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (BDT) *</label>
          <input type="number" id="prod-price" placeholder="299" min="0" />
        </div>
        <div class="form-group">
          <label>Visibility</label>
          <select id="prod-status">
            <option value="active">✓ Active</option>
            <option value="hidden">✕ Hidden</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Product Photo</label>
        <div class="photo-upload-area" id="photoUploadArea">
          <input type="file" accept="image/*" id="photoInput" onchange="handlePhotoUpload(event)" />
          <div id="photoPlaceholder">📷 Click to upload a photo<br><small style="color:var(--gray)">JPG, PNG — best size 600×600px</small></div>
          <img class="photo-preview" id="photoPreview" src="" alt="Preview" />
          <button type="button" class="remove-photo-btn" id="removePhotoBtn" onclick="removePhoto(event)">✕ Remove Photo</button>
        </div>
      </div>
      <div class="form-group">
        <label>Emoji Icon <small style="font-size:10px;color:var(--gray);font-weight:400">(shown if no photo)</small></label>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span id="selectedEmojiPreview" style="font-size:32px">📦</span>
          <span style="font-size:12px;color:var(--gray)">← selected</span>
        </div>
        <div class="emoji-picker" id="emojiPicker"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeProductModal()">Cancel</button>
      <button class="confirm-btn" onclick="saveProduct()">💾 Save Product</button>
    </div>
  </div>
</div>

<script>
// ============ CONFIG ============
const ADMIN_PASSWORD = 'admin123'; // ← CHANGE THIS
const EMOJIS = ['👟','👜','🎧','⌚','📱','💻','👗','👒','🎒','💄','🧴','🕶️','🧸','🎮','📦','🛋️','🍔','☕','🎁','💍','🌸','🧁','🏋️','📚','🎵','🖼️','🧦','👔','👠','🧣','🏀','⚽','🎯','🔑','💡','🌿','🍎','🥤','🎨','🧩','🖥️','🎀','🪴','🕯️','🧇','🍕','🧃','🪞','🛁','🪑','🧲','🎸'];
// ================================

let currentFilter = 'All';
let editingProductId = null;
let selectedEmoji = '📦';
let selectedPhoto = null;

// ── AUTH ──
function login() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminLayout').classList.add('show');
    renderStats();
    renderOrders();
    renderProducts();
    buildEmojiPicker();
  } else {
    alert('Wrong password! Try: admin123');
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminLayout').classList.remove('show');
  document.getElementById('passwordInput').value = '';
}

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── ORDERS ──
function getOrders() { return JSON.parse(localStorage.getItem('shop_orders') || '[]'); }
function saveOrders(o) { localStorage.setItem('shop_orders', JSON.stringify(o)); }

function renderStats() {
  const orders = getOrders();
  const revenue = orders.filter(o => o.status !== 'Cancelled').reduce((s, o) => s + o.price, 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value pink">${orders.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:var(--warning)">${orders.filter(o=>o.status==='Pending').length}</div></div>
    <div class="stat-card"><div class="stat-label">Delivered</div><div class="stat-value green">${orders.filter(o=>o.status==='Delivered').length}</div></div>
    <div class="stat-card"><div class="stat-label">Revenue</div><div class="stat-value pink">৳${revenue.toLocaleString()}</div></div>
  `;
}

function filterOrders(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let orders = getOrders();
  if (currentFilter !== 'All') orders = orders.filter(o => o.status === currentFilter);
  if (search) orders = orders.filter(o =>
    o.customerName.toLowerCase().includes(search) ||
    o.customerPhone.includes(search) ||
    o.txnId.toLowerCase().includes(search) ||
    o.id.toLowerCase().includes(search)
  );
  document.getElementById('orderCount').textContent = `(${orders.length})`;
  if (!orders.length) {
    document.getElementById('ordersList').innerHTML = `<div class="empty-state"><div>📭</div>No orders found.</div>`;
    return;
  }
  document.getElementById('ordersList').innerHTML = orders.map(order => `
    <div class="order-item">
      <div class="order-top">
        <div>
          <span class="order-id-tag">${order.id}</span>
          <div class="order-date">🕐 ${order.date}</div>
        </div>
        <select class="status-select status-${order.status.toLowerCase()}" onchange="updateStatus('${order.id}', this.value, this)">
          <option ${order.status==='Pending'?'selected':''}>Pending</option>
          <option ${order.status==='Confirmed'?'selected':''}>Confirmed</option>
          <option ${order.status==='Delivered'?'selected':''}>Delivered</option>
          <option ${order.status==='Cancelled'?'selected':''}>Cancelled</option>
        </select>
      </div>
      <div class="order-details">
        <div><div class="order-detail-label">Customer</div><div class="order-detail-value">${order.customerName}</div></div>
        <div><div class="order-detail-label">Phone</div><div class="order-detail-value">${order.customerPhone}</div></div>
        <div><div class="order-detail-label">Product</div><div class="order-detail-value">${order.product}</div></div>
        <div><div class="order-detail-label">Amount</div><div class="order-detail-value" style="color:var(--pink)">৳${order.price}</div></div>
        <div><div class="order-detail-label">bKash TxnID</div><div class="order-detail-value txn-id">${order.txnId}</div></div>
        ${order.address ? `<div><div class="order-detail-label">Address</div><div class="order-detail-value" style="font-size:12px">${order.address}</div></div>` : ''}
        ${order.note ? `<div><div class="order-detail-label">Note</div><div class="order-detail-value" style="font-size:12px;color:var(--gray)">${order.note}</div></div>` : ''}
      </div>
    </div>
  `).join('');
}

function updateStatus(orderId, newStatus, selectEl) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.id === orderId);
  if (idx !== -1) {
    orders[idx].status = newStatus;
    saveOrders(orders);
    selectEl.className = `status-select status-${newStatus.toLowerCase()}`;
    renderStats();
  }
}

function clearAllOrders() {
  if (confirm('Delete ALL orders? This cannot be undone.')) {
    localStorage.removeItem('shop_orders');
    renderStats();
    renderOrders();
  }
}

// ── PRODUCTS ──
function getProducts() {
  const stored = localStorage.getItem('shop_products');
  if (stored) return JSON.parse(stored);
  const defaults = [
    { id: 1, name: 'Product One',   desc: 'Short description.',     price: 299, emoji: '👟', image: null, status: 'active' },
    { id: 2, name: 'Product Two',   desc: 'Another description.',   price: 599, emoji: '👜', image: null, status: 'active' },
    { id: 3, name: 'Product Three', desc: 'Describe this product.', price: 149, emoji: '🎧', image: null, status: 'active' },
    { id: 4, name: 'Product Four',  desc: 'Edit or delete this.',   price: 999, emoji: '⌚', image: null, status: 'active' },
  ];
  saveProducts(defaults);
  return defaults;
}
function saveProducts(p) { localStorage.setItem('shop_products', JSON.stringify(p)); }

function renderProducts() {
  const products = getProducts();
  if (!products.length) {
    document.getElementById('productsList').innerHTML = `<div class="empty-state"><div>🛍️</div>No products yet.</div>`;
    return;
  }
  document.getElementById('productsList').innerHTML = products.map(p => `
    <div class="product-admin-card">
      <div class="product-admin-thumb">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : p.emoji}
      </div>
      <div class="product-admin-info">
        <div class="product-admin-name">${p.name}</div>
        <span class="stock-badge ${p.status === 'active' ? 'stock-on' : 'stock-off'}">${p.status === 'active' ? '✓ Active' : '✕ Hidden'}</span>
        <div class="product-admin-price">৳${p.price}</div>
        <div class="product-admin-actions">
          <button class="edit-btn" onclick="openProductModal(${p.id})">✏️ Edit</button>
          <button class="del-btn" onclick="deleteProduct(${p.id})">🗑 Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function openProductModal(productId) {
  editingProductId = productId || null;
  document.getElementById('modalTitle').textContent = productId ? 'Edit Product' : 'Add Product';
  if (productId) {
    const p = getProducts().find(x => x.id === productId);
    document.getElementById('prod-name').value = p.name;
    document.getElementById('prod-desc').value = p.desc || '';
    document.getElementById('prod-price').value = p.price;
    document.getElementById('prod-status').value = p.status;
    selectEmoji(p.emoji || '📦');
    resetPhotoUpload(p.image || null);
  } else {
    ['prod-name', 'prod-desc', 'prod-price'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('prod-status').value = 'active';
    selectEmoji('📦');
    resetPhotoUpload(null);
  }
  document.getElementById('productModal').classList.add('open');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
  editingProductId = null;
}

function saveProduct() {
  const name  = document.getElementById('prod-name').value.trim();
  const price = parseInt(document.getElementById('prod-price').value);
  if (!name)            { alert('Please enter a product name.'); return; }
  if (!price || price < 1) { alert('Please enter a valid price.'); return; }

  const products = getProducts();
  const productData = {
    name,
    desc:   document.getElementById('prod-desc').value.trim(),
    price,
    emoji:  selectedEmoji,
    image:  selectedPhoto,
    status: document.getElementById('prod-status').value
  };

  if (editingProductId) {
    const i = products.findIndex(p => p.id === editingProductId);
    if (i !== -1) {
      if (!selectedPhoto && products[i].image) productData.image = products[i].image;
      products[i] = { ...products[i], ...productData };
    }
  } else {
    products.push({ id: Date.now(), ...productData });
  }

  saveProducts(products);
  renderProducts();
  closeProductModal();
}

function deleteProduct(productId) {
  if (!confirm('Delete this product?')) return;
  saveProducts(getProducts().filter(p => p.id !== productId));
  renderProducts();
}

// ── PHOTO UPLOAD ──
function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  // localStorage has a strict ~5MB total limit per website.
  // We restrict image sizes to 1MB to prevent running out of storage.
  if (file.size > 1024 * 1024) {
    alert("This image is too large! Please upload a file smaller than 1MB.");
    event.target.value = ''; // Reset file input
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    selectedPhoto = e.target.result; // Saves image as a Base64 string
    
    // Update the Admin UI preview panels
    document.getElementById('photoPreview').src = selectedPhoto;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoPlaceholder').style.display = 'none';
    document.getElementById('removePhotoBtn').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function removePhoto(event) {
  if (event) event.stopPropagation(); // Prevents refiring file select window
  
  selectedPhoto = null;
  document.getElementById('photoInput').value = ''; 
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoPreview').classList.remove('show');
  document.getElementById('photoPlaceholder').style.display = 'block';
  document.getElementById('removePhotoBtn').classList.remove('show');
}

function resetPhotoUpload(imageUrl) {
  selectedPhoto = imageUrl || null;
  document.getElementById('photoInput').value = '';

  if (selectedPhoto) {
    document.getElementById('photoPreview').src = selectedPhoto;
    document.getElementById('photoPreview').classList.add('show');
    document.getElementById('photoPlaceholder').style.display = 'none';
    document.getElementById('removePhotoBtn').classList.add('show');
  } else {
    document.getElementById('photoPreview').src = '';
    document.getElementById('photoPreview').classList.remove('show');
    document.getElementById('photoPlaceholder').style.display = 'block';
    document.getElementById('removePhotoBtn').classList.remove('show');
  }
}

function buildEmojiPicker() {
  const picker = document.getElementById('emojiPicker');
  if (!picker) return;
  picker.innerHTML = EMOJIS.map(emoji =>
    `<div class="emoji-option ${emoji === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${emoji}')">${emoji}</div>`
  ).join('');
}

function selectEmoji(emoji) {
  selectedEmoji = emoji;
  document.getElementById('selectedEmojiPreview').textContent = emoji;
  document.querySelectorAll('.emoji-option').forEach(el => {
    el.classList.toggle('selected', el.textContent === emoji);
  });
}
